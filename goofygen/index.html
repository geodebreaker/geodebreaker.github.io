const alphabet = "abcedfghijklmnopqrstuvwxyz";
function genid() {
  let n = Math.floor(Math.random() * 2) + 2;
  let w = "";
  for (let i = 0; i < n; i++) {
    w += syllables[Math.floor(Math.random() * syllables.length)];
  }
  if (Math.random() > /*0.8*/0.4) {
    w += alphabet[Math.floor(Math.random() * alphabet.length)];
  }
  return w;
}
function gen() {
	let x = "";
	for ( let i = 0; i < 30; i++) {
		x += '<span onclick="add(this)">' + genid() + '</span><br>'
	}
	document.querySelector("#x").innerHTML = x;
}
gen();
function add(x) {
	document.querySelector("#y").innerHTML += x.innerHTML + '<br>'
}
